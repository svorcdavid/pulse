<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        [x-cloak] { display: none !important; }

        /* Login Screen */
        .login-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 360px;
            margin-top: 10vh;
        }

        /* App Container */
        .app-container {
            width: 100%;
            max-width: 800px;
            padding: 1rem;
        }

        /* Header & Nav */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem 0;
        }

        .mode-switcher {
            background: #eef2ff;
            padding: 4px;
            border-radius: 12px;
            display: flex;
            gap: 4px;
        }

        .mode-btn {
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            background: transparent;
            color: var(--text-dim);
        }

        .mode-btn.active {
            background: var(--card);
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        /* Input Area */
        .quick-add {
            background: var(--card);
            padding: 0.5rem;
            border-radius: 16px;
            display: flex;
            gap: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .quick-add input {
            border: none;
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            outline: none;
        }

        /* Task List */
        .task-list { display: flex; flex-direction: column; gap: 12px; }

        .task-item {
            background: var(--card);
            padding: 1rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.1s;
        }

        .task-item:hover { border-color: var(--primary); }

        .check-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        .check-btn.done { background: #22c55e; border-color: #22c55e; color: white; }

        /* Master View Table */
        .master-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .master-table th, .master-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: #f1f5f9;
            color: var(--text-dim);
        }

        .btn-claim {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-claim.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }

        /* Icons Utils */
        .icon { font-family: 'Material Symbols Rounded'; font-size: 20px; vertical-align: middle; }
    </style>
</head>
<body x-data="pulseApp()" x-init="initPB()">

    <template x-if="!user">
    <div class="login-card">
        <h2 style="margin-top:0">Pulse Login</h2>
        <p style="color:var(--text-dim); font-size: 0.9rem">Zadej adresu své PocketBase a údaje.</p>
        
        <label style="font-size: 0.7rem; color: var(--text-dim); font-weight: 600">PB INSTANCE URL</label>
        <input type="text" x-model="pbUrl" placeholder="https://tvou-vps.cz" 
               style="width:100%; padding:12px; margin: 4px 0 16px 0; border-radius:8px; border:1px solid var(--border); background: #f1f5f9">

        <label style="font-size: 0.7rem; color: var(--text-dim); font-weight: 600">EMAIL / HESLO</label>
        <input type="email" x-model="email" placeholder="Email" 
               style="width:100%; padding:12px; margin: 4px 0; border-radius:8px; border:1px solid var(--border)">
        
        <input type="password" x-model="pass" placeholder="Heslo" 
               style="width:100%; padding:12px; margin: 4px 0; border-radius:8px; border:1px solid var(--border)">
        
        <button @click="login()" 
                style="width:100%; padding:14px; margin-top:16px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:600; cursor:pointer; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3)">
            Vstoupit do Pulse
        </button>

        <p x-show="errorMessage" x-text="errorMessage" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px; text-align: center"></p>
    </div>
    </template>

    <template x-if="user">
        <div class="app-container" x-cloak>
            <header>
                <div style="font-weight: 800; letter-spacing: -1px; font-size: 1.5rem; color: var(--primary)">PULSE</div>
                <div class="mode-switcher">
                    <button class="mode-btn" :class="mode === 'core' && 'active'" @click="mode = 'core'">Core</button>
                    <button class="mode-btn" :class="mode === 'master' && 'active'" @click="mode = 'master'">Master</button>
                </div>
                <button @click="logout()" style="background:none; border:none; cursor:pointer; color:var(--text-dim)">
                    <span class="icon">logout</span>
                </button>
            </header>

            <div class="quick-add">
                <span class="icon" style="padding: 12px; color: var(--text-dim)">add_circle</span>
                <input type="text" x-model="newTaskTitle" @keyup.enter="addTask()" placeholder="Rychle něco přidej...">
            </div>

            <div x-show="mode === 'core'" class="task-list">
                <template x-for="task in tasks" :key="task.id">
                    <div class="task-item">
                        <div class="check-btn" @click="completeTask(task.id)"></div>
                        <div style="flex:1">
                            <div x-text="task.title" style="font-weight:500"></div>
                            <div x-show="task.due_date" x-text="formatDate(task.due_date)" style="font-size:0.75rem; color:var(--text-dim)"></div>
                        </div>
                        <button class="btn-claim" @click="claimTask(task.id)" :class="task.assignee.includes(user.id) && 'active'">
                            <span class="icon">person</span>
                            <span x-text="task.assignee.includes(user.id) ? 'Moje' : 'Převzít'"></span>
                        </button>
                    </div>
                </template>
            </div>

            <div x-show="mode === 'master'">
                <table class="master-table">
                    <thead>
                        <tr style="color: var(--text-dim); font-size: 0.8rem">
                            <th>Úkol</th>
                            <th>Kdo</th>
                            <th>Termín</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="task in tasks" :key="task.id">
                            <tr>
                                <td x-text="task.title" style="font-weight:500"></td>
                                <td>
                                    <template x-for="tag in task.expand?.tags">
                                        <span class="tag" x-text="tag.title"></span>
                                    </template>
                                </td>
                                <td x-text="task.due_date ? formatDate(task.due_date) : '-'" style="color:var(--text-dim); font-size:0.85rem"></td>
                                <td>
                                    <span :style="'color:' + (task.expand?.status?.color || '#000')" x-text="task.expand?.status?.title"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <script>
        const pb = new PocketBase('http://127.0.0.1:8090'); // TVOJE URL

        function pulseApp() {
            return {
                user: null,
                pbUrl: localStorage.getItem('pulse_pb_url') || '', // Pamatuje si URL z minule
                email: '',
                pass: '',
                mode: 'core',
                tasks: [],
                newTaskTitle: '',
                errorMessage: '',
                pb: null,

                async initPB() {
                    // Pokud už máme URL a jsme přihlášení v localStorage
                    if (this.pbUrl) {
                        this.pb = new PocketBase(this.pbUrl);
                        if (this.pb.authStore.model) {
                            this.user = this.pb.authStore.model;
                            this.loadTasks();
                        }
                    }
                },

                async login() {
                    try {
                        this.errorMessage = '';
                        // Inicializace PB s URL z políčka
                        this.pb = new PocketBase(this.pbUrl);
                        
                        await this.pb.collection('users').authWithPassword(this.email, this.pass);
                        
                        // Uložíme si URL do prohlížeče pro příště
                        localStorage.setItem('pulse_pb_url', this.pbUrl);
                        
                        this.user = this.pb.authStore.model;
                        this.loadTasks();
                    } catch (err) {
                        this.errorMessage = 'Chyba: ' + err.message;
                    }
                },

                logout() {
                    this.pb.authStore.clear();
                    this.user = null;
                },

                async loadTasks() {
                    try {
                        this.tasks = await this.pb.collection('pulse_tasks').getFullList({
                            sort: '-created',
                            expand: 'status,priority,tags'
                        });
                    } catch (err) {
                        console.error("Chyba při načítání:", err);
                    }
                },

                async addTask() {
                    if (!this.newTaskTitle) return;
                    try {
                        await this.pb.collection('pulse_tasks').create({
                            title: this.newTaskTitle,
                            assignee: [this.user.id]
                        });
                        this.newTaskTitle = '';
                        this.loadTasks();
                    } catch (err) {
                        alert("Nepodařilo se přidat úkol.");
                    }
                },

                // ... zbytek funkcí (claimTask, formatDate) zůstává stejný, 
                // jen místo 'pb.' používej 'this.pb.'
            }
        }
    </script>
</body>
</html>
