<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --primary: #4f46e5; 
            --text-main: #1e293b; --text-dim: #64748b; 
            --border: #e2e8f0; --shadow: 0 1px 1px 0 rgb(0 0 0 / 0.1); 
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; min-height: 100vh; width: 100%; overflow-x: hidden; }
        [x-cloak] { display: none !important; }

        .app-container { width: 100%; max-width: 800px; margin: 0 auto; padding: 1rem; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; margin-bottom: 1rem; }
        
        .card { background: var(--card); border-radius: 8px; border: 1px solid var(--border); box-shadow: var(--shadow); }

        .mode-switcher { background: #e2e8f0; padding: 3px; border-radius: 8px; display: flex; gap: 2px; }
        .mode-btn { border: none; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 0.8rem; background: transparent; color: var(--text-dim); transition: 0.2s; }
        .mode-btn.active { background: var(--card); color: var(--primary); box-shadow: var(--shadow); }

        .quick-add { display: flex; gap: 10px; padding: 0.5rem; margin-bottom: 1.5rem; align-items: center; }
        .quick-add input { border: none; flex: 1; padding: 10px; font-size: 1rem; color: var(--text-main); outline: none; background: transparent; width: 100%; }

        .task-list { display: flex; flex-direction: column; gap: 8px; }
        .task-item { padding: 0.8rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-dim); padding: 5px; display: flex; align-items: center; transition: 0.2s; }
        .icon-btn:hover { color: var(--primary); }
        .icon-btn.active { color: var(--primary); font-variation-settings: 'FILL' 1; }
        .check-icon-btn { color: #cbd5e1; transition: 0.2s; }
        .check-icon-btn:hover { color: #22c55e; transform: scale(1.1); }

        .icon { font-family: 'Material Symbols Rounded'; font-size: 24px; }

        .avatar-stack { display: flex; align-items: center; flex-direction: row-reverse; justify-content: flex-end; }
        .avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--card); object-fit: cover; margin-left: -10px; background: #eee; }
        .avatar:last-child { margin-left: 0; }

        .avatar-grid { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .avatar-large { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; background: #eee; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
        .modal { background: var(--card); padding: 1.5rem; border-radius: 8px; width: 100%; max-width: 550px; max-height: 95vh; overflow-y: auto; }
        .modal label { display: block; margin-top: 12px; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px; margin-top: 4px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; outline: none; font-size: 0.95rem; }
        
        .date-presets { display: flex; gap: 5px; margin-top: 5px; }
        .btn-date { flex: 1; padding: 8px; border: 1px solid var(--border); background: white; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: 600; color: var(--text-dim); }
        .btn-date:hover { background: #f1f5f9; color: var(--primary); }

        .tree-node { margin-bottom: 4px; }
        .tree-card { padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; border-radius: 8px; border: 1px solid transparent; }
        .tree-card:hover { background: #f1f5f9; border-color: var(--border); }
    </style>
</head>
<body x-data="pulseApp()" x-init="initPB()">

    <template x-if="!user">
        <div class="app-container" style="display: flex; justify-content: center; padding-top: 10vh;">
            <div class="card" style="padding: 2rem; width: 100%; max-width: 380px;">
                <h2 style="margin: 0 0 1.5rem 0;">Pulse</h2>
                <input type="text" x-model="pbUrl" placeholder="URL PocketBase" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border)">
                <input type="email" x-model="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border)">
                <input type="password" x-model="pass" placeholder="Heslo" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid var(--border)">
                <button @click="login()" style="width:100%; padding:12px; border-radius:8px; border:none; background:var(--primary); color:white; font-weight:600; cursor:pointer">Vstoupit</button>
            </div>
        </div>
    </template>

    <template x-if="user">
        <div class="app-container" x-cloak>
            <header>
                <div style="font-weight: 800; font-size: 1.4rem; color: var(--primary)">PULSE</div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div class="mode-switcher">
                        <button class="mode-btn" :class="mode === 'core' && 'active'" @click="mode = 'core'">Core</button>
                        <button class="mode-btn" :class="mode === 'master' && 'active'" @click="mode = 'master'">Master</button>
                        <div style="width: 1px; background: var(--border); margin: 4px 2px;"></div>
                        <button class="mode-btn" :class="onlyMine && 'active'" @click="onlyMine = !onlyMine" title="Jen moje úkoly">
                            <span class="icon" style="font-size: 18px; vertical-align: middle;">person</span>
                        </button>
                    </div>
                    <button @click="logout()" class="icon-btn"><span class="icon">logout</span></button>
                </div>
            </header>

            <div class="card quick-add">
                <input type="text" x-model="newTaskTitle" @keyup.enter="addTask()" placeholder="koupit mléko..">
                <button @click="addTask()" class="icon-btn" style="color: var(--primary)"><span class="icon">add_circle</span></button>
            </div>

            <div x-show="mode === 'core'" class="task-list">
                <template x-for="task in filteredTasks" :key="task.id">
                    <div class="card task-item">
                        <div style="flex:1; cursor:pointer" @click="openEdit(task)">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <template x-if="task.expand?.priority">
                                    <span :style="'width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background:' + task.expand.priority.color"></span>
                                </template>
                                <span x-text="task.title" style="font-weight:600"></span>
                            </div>
                            <div style="font-size:0.7rem; color:var(--text-dim); margin-top:3px; display: flex; align-items: center; gap: 6px;">
                                <template x-if="task.expand?.parent_task"><span x-text="task.expand.parent_task.title + ' • '"></span></template>
                                <span x-text="task.due_date ? formatDate(task.due_date) : 'Bez termínu'"></span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <div class="avatar-stack">
                                <template x-for="userId in task.assignee" :key="userId">
                                    <img :src="getUserAvatar(userId)" class="avatar" :title="getUserName(userId)">
                                </template>
                            </div>
                            <div style="display: flex; gap: 4px; align-items: center; border-left: 1px solid var(--border); padding-left: 8px;">
                                <button class="icon-btn" @click="claimTask(task)" :class="task.assignee.includes(user.id) && 'active'"><span class="icon">person_check</span></button>
                                <button class="icon-btn check-icon-btn" @click="completeTask(task)"><span class="icon">check_circle</span></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="mode === 'master'">
                <div class="card" style="padding: 1.5rem;">
                    <h3 style="margin-top:0">Strom projektů</h3>
                    <div class="tree-container">
                        <div x-html="renderTree()"></div>
                    </div>
                </div>
            </div>

            <template x-if="editingTask">
                <div class="modal-overlay" @click.self="editingTask = null">
                    <div class="modal">
                        <h2 style="margin: 0 0 1rem 0;">Upravit úkol</h2>
                        
                        <label>Název</label>
                        <input type="text" x-model="editingTask.title">

                        <div x-show="mode === 'master'">
                            <label>Popis</label>
                            <textarea x-model="editingTask.description" placeholder="Podrobnosti..."></textarea>

                            <div style="display: flex; gap: 10px;">
                                <div style="flex:1">
                                    <label>Priorita</label>
                                    <select x-model="editingTask.priority">
                                        <option value="">-- Žádná --</option>
                                        <template x-for="p in priorities" :key="p.id">
                                            <option :value="p.id" x-text="p.title" :selected="p.id == editingTask.priority"></option>
                                        </template>
                                    </select>
                                </div>
                                <div style="flex:1">
                                    <label>Status</label>
                                    <select x-model="editingTask.status">
                                        <template x-for="s in statuses" :key="s.id">
                                            <option :value="s.id" x-text="s.title" :selected="s.id == editingTask.status"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <label>Termín</label>
                        <input type="datetime-local" x-model="editingTask.due_date">
                        <div class="date-presets">
                            <button class="btn-date" @click="setQuickDate(0)">Dnes</button>
                            <button class="btn-date" @click="setQuickDate(1)">Zítra</button>
                        </div>

                        <label>Přiřazení lidé</label>
                        <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px;">
                            <template x-for="u in availableUsers" :key="u.id">
                                <div style="position: relative; cursor: pointer; transition: 0.2s;" @click="editingTask.assignee.includes(u.id) ? editingTask.assignee = editingTask.assignee.filter(id => id !== u.id) : editingTask.assignee.push(u.id)" :title="u.name || u.email">
                                    <img :src="getUserAvatar(u.id)" class="avatar-large" style="transition: 0.2s;">
                                    <template x-if="editingTask.assignee.includes(u.id)">
                                        <div style="position: absolute; top: -2px; right: -2px; background: var(--primary); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card);">
                                            <span class="icon" style="font-size: 12px;">check</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <label>Nadřazený úkol</label>
                        <select x-model="editingTask.parent_task">
                            <option value="">-- Žádný (Top Level) --</option>
                            <template x-for="t in tasks.filter(t => t.id !== editingTask.id)" :key="t.id">
                                <option :value="t.id" x-text="t.title"></option>
                            </template>
                        </select>

                        <div style="display:flex; gap:10px; margin-top:20px">
                            <button @click="editingTask = null" style="flex:1; padding:12px; background:#f1f5f9; border:none; border-radius:8px; cursor:pointer">Zavřít</button>
                            <button @click="saveEdit()" style="flex:2; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700">Uložit</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <script>
        function pulseApp() {
            return {
                user: null, 
                pb: null, 
                pbUrl: localStorage.getItem('pulse_pb_url') || '',
                email: '', 
                pass: '', 
                mode: 'core', 
                tasks: [], 
                availableUsers: [], 
                statuses: [], 
                priorities: [], 
                newTaskTitle: '', 
                editingTask: null, 
                onlyMine: false,

                async initPB() {
                    window.pulse = this; 
                    if (this.pbUrl) {
                        try {
                            this.pb = new PocketBase(this.pbUrl);
                            if (this.pb.authStore.isValid) {
                                this.user = this.pb.authStore.model;
                                await this.loadData();
                                this.subscribeToTasks();
                            }
                        } catch (e) { this.user = null; }
                    }
                },

                async login() {
                    this.pb = new PocketBase(this.pbUrl);
                    await this.pb.collection('users').authWithPassword(this.email, this.pass);
                    localStorage.setItem('pulse_pb_url', this.pbUrl);
                    this.user = this.pb.authStore.model; 
                    await this.loadData();
                    this.subscribeToTasks();
                },

                logout() { 
                    if (this.pb) {
                        this.pb.collection('pulse_tasks').unsubscribe();
                        this.pb.authStore.clear(); 
                    }
                    this.user = null; 
                },

                async loadData() {
                    if (!this.pb) return;
                    try {
                        const allUsers = await this.pb.collection('users').getFullList();
                        const filteredUsers = allUsers.filter(u => u.apps && u.apps.includes('pulse'));
                        
                        const [t, s, p] = await Promise.all([
                            this.pb.collection('pulse_tasks').getFullList({ sort: '-created', expand: 'status,parent_task,priority' }),
                            this.pb.collection('pulse_statuses').getFullList({ sort: 'sort_order' }),
                            this.pb.collection('pulse_priorities').getFullList({ sort: 'level' })
                        ]);
                        this.tasks = t; 
                        this.statuses = s; 
                        this.availableUsers = filteredUsers; 
                        this.priorities = p;
                        console.log('All users:', allUsers.length, 'Filtered users with pulse:', filteredUsers.length, 'Loaded tasks:', t.length);
                    } catch (e) { console.error("Chyba při načítání dat:", e); }
                },

                async subscribeToTasks() {
                    if (!this.pb) return;
                    await this.pb.collection('pulse_tasks').subscribe('*', () => this.loadData());
                },

                get filteredTasks() {
                    return this.tasks
                        .filter(t => {
                            const notClosed = !t.expand?.status?.is_closed;
                            return this.onlyMine ? (notClosed && t.assignee.includes(this.user?.id)) : notClosed;
                        })
                        .sort((a, b) => {
                            // 1. Řazení podle data (nejbližší nahoře, bez data dole)
                            const dateA = a.due_date ? new Date(a.due_date).getTime() : 253402300799000; 
                            const dateB = b.due_date ? new Date(b.due_date).getTime() : 253402300799000;
                            if (dateA !== dateB) return dateA - dateB;

                            // 2. Sekundární řazení podle priority level
                            const levelA = a.expand?.priority?.level ?? 999;
                            const levelB = b.expand?.priority?.level ?? 999;
                            return levelA - levelB;
                        });
                },

                getUserAvatar(userId) {
                    const u = this.availableUsers.find(x => x.id === userId);
                    // POUŽITO .getURL() s velkým URL
                    if (u && u.avatar) return this.pb.files.getURL(u, u.avatar, { thumb: '64x64' });
                    return `https://ui-avatars.com/api/?name=${encodeURIComponent(u?.name || 'U')}&background=random`;
                },

                getUserName(userId) {
                    const u = this.availableUsers.find(x => x.id === userId);
                    return u ? (u.name || u.email) : 'Neznámý';
                },

                setQuickDate(days) {
                    const d = new Date();
                    d.setDate(d.getDate() + days);
                    // Korekce na lokální čas pro input
                    const tzOffset = d.getTimezoneOffset() * 60000;
                    const localISOTime = (new Date(d - tzOffset)).toISOString().slice(0, 16);
                    this.editingTask.due_date = localISOTime;
                },

                renderTree() {
                    let html = '';
                    const roots = this.tasks.filter(t => !t.parent_task);
                    roots.forEach(task => { 
                        const node = this.renderNode(task, 0);
                        if (node) html += node;
                    });
                    return html || '<p style="color:var(--text-dim); text-align:center">Žádné úkoly.</p>';
                },

                renderNode(task, depth) {
                    const children = this.tasks.filter(t => t.parent_task === task.id);
                    if (this.onlyMine && !task.assignee.includes(this.user?.id) && !children.some(c => this.hasAssignedRecursive(c))) return '';

                    const isClosed = task.expand?.status?.is_closed;
                    const avatarsHtml = task.assignee.map(uid => `<img src="${this.getUserAvatar(uid)}" class="avatar" style="width:20px; height:20px; margin-left:-6px">`).join('');

                    return `
                        <div class="tree-node" style="padding-left: ${depth * 24}px">
                            <div class="tree-card">
                                <div style="flex:1; cursor:pointer; display:flex; align-items:center; gap:8px" onclick="window.pulse.openEditById('${task.id}')">
                                    <span class="icon" style="font-size:18px; color:var(--text-dim)">${children.length ? 'folder_open' : 'description'}</span>
                                    <span style="${isClosed ? 'text-decoration:line-through; opacity:0.5' : ''}">${task.title}</span>
                                </div>
                                <div style="display:flex; gap:8px; align-items:center">
                                    <div class="avatar-stack">${avatarsHtml}</div>
                                    <button class="icon-btn check-icon-btn" onclick="window.pulse.completeTaskById('${task.id}')"><span class="icon" style="font-size:20px">check_circle</span></button>
                                </div>
                            </div>
                        </div>
                    ` + children.map(child => this.renderNode(child, depth + 1)).join('');
                },

                hasAssignedRecursive(task) {
                    if (task.assignee.includes(this.user?.id)) return true;
                    return this.tasks.filter(t => t.parent_task === task.id).some(c => this.hasAssignedRecursive(c));
                },

                openEditById(id) { const t = this.tasks.find(x => x.id === id); if (t) this.openEdit(t); },
                completeTaskById(id) { const t = this.tasks.find(x => x.id === id); if (t) this.completeTask(t); },

                async addTask() {
                    if (!this.newTaskTitle) return;
                    await this.pb.collection('pulse_tasks').create({ 
                        title: this.newTaskTitle, 
                        assignee: [this.user.id], 
                        creator: this.user.id 
                    });
                    this.newTaskTitle = ''; await this.loadData();
                },

                async completeTask(task) {
                    const done = this.statuses.find(s => s.is_closed);
                    if (done) { 
                        await this.pb.collection('pulse_tasks').update(task.id, { status: done.id }); 
                        await this.loadData(); 
                    }
                },

                async claimTask(task) {
                    let ids = [...(task.assignee || [])];
                    ids = ids.includes(this.user.id) ? ids.filter(i => i !== this.user.id) : [...ids, this.user.id];
                    await this.pb.collection('pulse_tasks').update(task.id, { assignee: ids }); 
                    await this.loadData();
                },

                openEdit(task) {
                    let localDate = '';
                    if (task.due_date) {
                        const d = new Date(task.due_date);
                        const tzOffset = d.getTimezoneOffset() * 60000;
                        localDate = (new Date(d - tzOffset)).toISOString().slice(0, 16);
                    }
                    this.editingTask = { ...task, due_date: localDate };
                },

                async saveEdit() {
                    const { id, title, description, status, due_date, assignee, parent_task, priority } = this.editingTask;
                    const data = { 
                        title, 
                        description, 
                        due_date: due_date ? new Date(due_date).toISOString() : null, 
                        assignee, 
                        priority: priority || null, 
                        status, 
                        parent_task: parent_task || null 
                    };
                    await this.pb.collection('pulse_tasks').update(id, data);
                    this.editingTask = null; 
                    await this.loadData();
                },

                formatDate(d) { return new Date(d).toLocaleDateString('cs-CZ', {day:'numeric', month:'short'}); }
            }
        }
    </script>
</body>
</html>
