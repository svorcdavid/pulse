<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        [x-cloak] { display: none !important; }

        .login-card { background: var(--card); padding: 2rem; border-radius: 24px; box-shadow: var(--shadow); width: 100%; max-width: 360px; margin-top: 10vh; }
        .app-container { width: 100%; max-width: 800px; padding: 1rem; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding: 1rem 0; }

        /* Zmenšený switcher */
        .mode-switcher { background: #eef2ff; padding: 2px; border-radius: 10px; display: flex; gap: 2px; font-size: 0.75rem; }
        .mode-btn { border: none; padding: 4px 10px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; background: transparent; color: var(--text-dim); }
        .mode-btn.active { background: var(--card); color: var(--primary); box-shadow: var(--shadow); }

        .quick-add { background: var(--card); padding: 0.5rem; border-radius: 16px; display: flex; gap: 10px; box-shadow: var(--shadow); margin-bottom: 2rem; border: 1px solid var(--border); }
        .quick-add input { border: none; flex: 1; padding: 12px; font-size: 1rem; outline: none; }

        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item { background: var(--card); padding: 1rem; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; box-shadow: var(--shadow); border: 1px solid var(--border); }

        .task-controls { display: flex; align-items: center; gap: 12px; }

        /* Checkbox vpravo */
        .check-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: grid; place-items: center; transition: 0.2s; }
        .check-btn:hover { border-color: #22c55e; color: #22c55e; }

        .btn-claim { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 6px; cursor: pointer; display: flex; color: var(--text-dim); transition: 0.2s; }
        .btn-claim.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }

        .icon { font-family: 'Material Symbols Rounded'; font-size: 20px; vertical-align: middle; }
        
        /* Master Table */
        .master-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
        .master-table th, .master-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body x-data="pulseApp()" x-init="initPB()">

    <template x-if="!user">
        <div class="login-card">
            <h2 style="margin-top:0">Pulse Login</h2>
            <input type="text" x-model="pbUrl" placeholder="https://tvou-vps.cz" style="width:100%; padding:12px; margin: 8px 0; border-radius:8px; border:1px solid var(--border)">
            <input type="email" x-model="email" placeholder="Email" style="width:100%; padding:12px; margin: 8px 0; border-radius:8px; border:1px solid var(--border)">
            <input type="password" x-model="pass" placeholder="Heslo" style="width:100%; padding:12px; margin: 8px 0; border-radius:8px; border:1px solid var(--border)">
            <button @click="login()" style="width:100%; padding:14px; margin-top:10px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:600; cursor:pointer">Vstoupit</button>
            <p x-show="errorMessage" x-text="errorMessage" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px; text-align: center"></p>
        </div>
    </template>

    <template x-if="user">
        <div class="app-container" x-cloak>
            <header>
                <div style="font-weight: 800; letter-spacing: -1px; font-size: 1.5rem; color: var(--primary)">PULSE</div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="mode-switcher">
                        <button class="mode-btn" :class="mode === 'core' && 'active'" @click="mode = 'core'">Core</button>
                        <button class="mode-btn" :class="mode === 'master' && 'active'" @click="mode = 'master'">Master</button>
                    </div>
                    <button @click="logout()" style="background:none; border:none; cursor:pointer; color:var(--text-dim)">
                        <span class="icon">logout</span>
                    </button>
                </div>
            </header>

            <div class="quick-add">
                <span class="icon" style="padding: 12px; color: var(--text-dim)">add_circle</span>
                <input type="text" x-model="newTaskTitle" @keyup.enter="addTask()" placeholder="Rychle něco přidej...">
            </div>

            <div x-show="mode === 'core'" class="task-list">
                <template x-for="task in tasks.filter(t => !t.expand?.status?.is_closed)" :key="task.id">
                    <div class="task-item">
                        <div style="flex:1">
                            <div x-text="task.title" style="font-weight:500"></div>
                            <div x-show="task.due_date" x-text="formatDate(task.due_date)" style="font-size:0.75rem; color:var(--text-dim)"></div>
                        </div>
                        <div class="task-controls">
                            <button class="btn-claim" @click="claimTask(task)" :class="task.assignee.includes(user.id) && 'active'">
                                <span class="icon" x-text="task.assignee.includes(user.id) ? 'person_check' : 'person_add'"></span>
                            </button>
                            <div class="check-btn" @click="completeTask(task)">
                                <span class="icon" style="font-size:16px">check</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="mode === 'master'">
                <table class="master-table">
                    <thead>
                        <tr style="color: var(--text-dim); font-size: 0.8rem">
                            <th>Úkol</th>
                            <th>Kdo</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="task in tasks" :key="task.id">
                            <tr :style="task.expand?.status?.is_closed ? 'opacity: 0.5' : ''">
                                <td x-text="task.title" style="font-weight:500"></td>
                                <td style="font-size: 0.8rem; color: var(--text-dim)" x-text="task.assignee.length > 0 ? 'Přiřazeno' : '-'"></td>
                                <td>
                                    <span :style="'color:' + (task.expand?.status?.color || '#000')" x-text="task.expand?.status?.title"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <script>
        function pulseApp() {
            return {
                user: null,
                pbUrl: localStorage.getItem('pulse_pb_url') || '',
                email: '',
                pass: '',
                mode: 'core',
                tasks: [],
                newTaskTitle: '',
                errorMessage: '',
                pb: null,

                async initPB() {
                    if (this.pbUrl) {
                        this.pb = new PocketBase(this.pbUrl);
                        if (this.pb.authStore.model) {
                            this.user = this.pb.authStore.model;
                            this.loadTasks();
                        }
                    }
                },

                async login() {
                    try {
                        this.errorMessage = '';
                        this.pb = new PocketBase(this.pbUrl);
                        await this.pb.collection('users').authWithPassword(this.email, this.pass);
                        localStorage.setItem('pulse_pb_url', this.pbUrl);
                        this.user = this.pb.authStore.model;
                        this.loadTasks();
                    } catch (err) {
                        this.errorMessage = 'Chyba: ' + err.message;
                    }
                },

                logout() {
                    this.pb.authStore.clear();
                    this.user = null;
                },

                async loadTasks() {
                    try {
                        this.tasks = await this.pb.collection('pulse_tasks').getFullList({
                            sort: '-created',
                            expand: 'status,priority,tags'
                        });
                    } catch (err) {
                        console.error("Chyba při načítání:", err);
                    }
                },

                async addTask() {
                    if (!this.newTaskTitle) return;
                    try {
                        await this.pb.collection('pulse_tasks').create({
                            title: this.newTaskTitle,
                            assignee: [this.user.id]
                        });
                        this.newTaskTitle = '';
                        this.loadTasks();
                    } catch (err) {
                        alert("Nepodařilo se přidat úkol.");
                    }
                },

                async completeTask(task) {
                    try {
                        const statuses = await this.pb.collection('pulse_statuses').getFullList();
                        const doneStatus = statuses.find(s => s.is_closed === true);
                        if (doneStatus) {
                            await this.pb.collection('pulse_tasks').update(task.id, { status: doneStatus.id });
                            this.loadTasks();
                        } else {
                            alert("Vytvoř v PocketBase status s is_closed = true!");
                        }
                    } catch (err) { console.error(err); }
                },

                async claimTask(task) {
                    try {
                        let newAssignees = [...task.assignee];
                        if (newAssignees.includes(this.user.id)) {
                            newAssignees = newAssignees.filter(id => id !== this.user.id);
                        } else {
                            newAssignees.push(this.user.id);
                        }
                        await this.pb.collection('pulse_tasks').update(task.id, { assignee: newAssignees });
                        this.loadTasks();
                    } catch (err) { console.error(err); }
                },

                formatDate(dateStr) {
                    return new Date(dateStr).toLocaleDateString('cs-CZ');
                }
            }
        }
    </script>
</body>
</html>
