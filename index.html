<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="pulseApp()" x-init="initPB()">

    <template x-if="!user">
        <div class="app-container" style="display: flex; justify-content: center; padding-top: 10vh;">
            <div class="card" style="padding: 2rem; width: 100%; max-width: 380px;">
                <h2 style="margin: 0 0 1.5rem 0;">Pulse</h2>
                <input type="text" x-model="pbUrl" placeholder="URL PocketBase" class="login-input">
                <input type="email" x-model="email" placeholder="Email" class="login-input">
                <input type="password" x-model="pass" placeholder="Heslo" class="login-input">
                <button @click="login()" class="login-btn">Vstoupit</button>
                <div x-show="errorMessage" x-text="errorMessage" class="error-msg"></div>
            </div>
        </div>
    </template>

    <template x-if="user">
        <div class="app-container" x-cloak>
            <template x-if="loading">
                <div class="modal-overlay loading-overlay">
                    <div class="modal loading-modal">
                        <div class="loading-text">Načítám data…</div>
                        <div class="loading-bar">
                            <div class="loading-progress"></div>
                        </div>
                    </div>
                </div>
            </template>
            <header>
                <div class="pulse-title">PULSE</div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div class="mode-switcher">
                        <button class="mode-btn" :class="mode === 'core' && 'active'" @click="mode = 'core'">Core</button>
                        <button class="mode-btn" :class="mode === 'master' && 'active'" @click="mode = 'master'">Master</button>
                        <div style="width: 1px; background: var(--border); margin: 4px 2px;"></div>
                        <button class="mode-btn" :class="onlyMine && 'active'" @click="onlyMine = !onlyMine" title="Jen moje úkoly">
                            <span class="icon" style="font-size: 18px; vertical-align: middle;">person</span>
                        </button>
                    </div>
                    <button @click="logout()" class="icon-btn"><span class="icon">logout</span></button>
                </div>
            </header>

            <div class="card quick-add">
                <input type="text" x-model="newTaskTitle" @keyup.enter="addTask()" placeholder="koupit mléko.." class="quick-input">
                <button @click="addTask()" class="icon-btn quick-btn"><span class="icon">add_circle</span></button>
            </div>

            <div x-show="mode === 'core'" class="task-list">
                <template x-for="task in filteredTasks" :key="task.id">
                    <div class="card task-item">
                        <div class="task-content" @click="openEdit(task)">
                            <div class="task-details">
                                <div class="task-header">
                                    <template x-if="task.expand?.priority">
                                        <span class="priority-dot" :style="'background:' + task.expand.priority.color"></span>
                                    </template>
                                    <template x-if="!task.expand?.priority">
                                        <span class="priority-dot" style="display: inline-block;"></span>
                                    </template>
                                    <span x-text="task.title" class="task-title"></span>
                                </div>
                                <div class="task-meta">
                                    <template x-if="task.expand?.parent_task"><span x-text="task.expand.parent_task.title + ' • '"></span></template>
                                    <span x-text="task.due_date ? formatDate(task.due_date) : 'Bez termínu'"></span>
                                </div>
                            </div>
                        </div>
                        <div class="task-assignees">
                            <div class="avatar-stack">
                                <template x-for="userId in task.assignee" :key="userId">
                                    <img :src="getUserAvatar(userId)" class="avatar" :title="getUserName(userId)">
                                </template>
                            </div>
                            <div class="task-actions">
                                <button class="icon-btn check-icon-btn" @click="completeTask(task)"><span class="icon">check_circle</span></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="mode === 'master'">
                <div class="card master-card">
                    <h3 class="master-title">Strom projektů</h3>
                            <div class="tree-container">
                        <template x-if="!flatTree.length">
                            <p class="no-tasks">Žádné úkoly.</p>
                        </template>
                        <template x-for="item in flatTree" :key="item.task.id">
                            <div class="tree-node" :style="'padding-left: ' + (item.depth * 24) + 'px'">
                                <div class="tree-card">
                                    <div class="tree-content" @click="openEditById(item.task.id)">
                                        <span class="icon tree-icon" x-text="getNodeIcon(item.task)"></span>
                                        <span :style="item.task.expand?.status?.is_closed ? 'text-decoration:line-through; opacity:0.5' : ''" x-text="item.task.title" class="tree-title"></span>
                                    </div>
                                    <div class="tree-actions">
                                        <div class="avatar-stack">
                                            <template x-for="userId in item.task.assignee" :key="userId">
                                                <img :src="getUserAvatar(userId)" class="avatar" :title="getUserName(userId)">
                                            </template>
                                        </div>
                                        <button class="icon-btn check-icon-btn" @click="completeTaskById(item.task.id)"><span class="icon" style="font-size:20px">check_circle</span></button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <template x-if="editingTask">
                <div class="modal-overlay" @click.self="editingTask = null">
                    <div class="modal">
                        <h2 class="modal-title">Upravit úkol</h2>
                        
                        <label>Název</label>
                        <input type="text" x-model="editingTask.title" class="modal-input">

                        <div x-show="mode === 'master'" class="modal-section">
                            <label>Popis</label>
                            <textarea x-model="editingTask.description" placeholder="Podrobnosti..." class="modal-textarea"></textarea>

                            <div class="modal-row">
                                <div class="modal-col">
                                    <label>Priorita</label>
                                    <select x-model="editingTask.priority" class="modal-input">
                                        <option value="">-- Žádná --</option>
                                        <template x-for="p in priorities" :key="p.id">
                                            <option :value="p.id" x-text="p.title" :selected="p.id == editingTask.priority"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="modal-col">
                                    <label>Status</label>
                                    <select x-model="editingTask.status" class="modal-input">
                                        <template x-for="s in statuses" :key="s.id">
                                            <option :value="s.id" x-text="s.title" :selected="s.id == editingTask.status"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <label>Termín</label>
                        <input type="datetime-local" x-model="editingTask.due_date" class="date-input">
                        <div class="date-presets">
                            <button class="btn-date" @click="setQuickDate(0)">Dnes</button>
                            <button class="btn-date" @click="setQuickDate(1)">Zítra</button>
                        </div>

                        <label>Přiřazení lidé</label>
                        <div class="assignee-grid">
                            <template x-for="u in availableUsers" :key="u.id">
                                <div class="assignee-item" @click="editingTask.assignee.includes(u.id) ? editingTask.assignee = editingTask.assignee.filter(id => id !== u.id) : editingTask.assignee.push(u.id)" :title="u.name || u.email">
                                    <img :src="getUserAvatar(u.id)" class="avatar-large assignee-avatar">
                                    <template x-if="editingTask.assignee.includes(u.id)">
                                        <div class="assignee-check">
                                            <span class="icon" style="font-size: 12px;">check</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <label>Nadřazený úkol</label>
                        <select x-model="editingTask.parent_task" class="parent-select">
                            <option value="">-- Žádný (Top Level) --</option>
                            <template x-for="t in tasks.filter(t => t.id !== editingTask.id)" :key="t.id">
                                <option :value="t.id" x-text="t.title"></option>
                            </template>
                        </select>

                        <div class="modal-buttons">
                            <button @click="editingTask = null" class="btn-cancel">Zavřít</button>
                            <button @click="saveEdit()" class="btn-save">Uložit</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <script>
        function pulseApp() {
            return {
                user: null, 
                pb: null, 
                pbUrl: localStorage.getItem('pulse_pb_url') || '',
                email: '', 
                pass: '', 
                errorMessage: '',
                mode: 'core', 
                tasks: [], 
                availableUsers: [], 
                statuses: [], 
                priorities: [], 
                newTaskTitle: '', 
                editingTask: null, 
                onlyMine: false,
                loading: false,

                async initPB() {
                    if (this.pbUrl) {
                        try {
                            this.pb = new PocketBase(this.pbUrl);
                            if (this.pb.authStore.isValid) {
                                this.user = this.pb.authStore.model;
                                await this.loadData();
                                this.subscribeToTasks();
                            }
                        } catch (e) { this.user = null; }
                    }
                },

                async login() {
                    this.errorMessage = '';
                    try {
                        this.pb = new PocketBase(this.pbUrl);
                        await this.pb.collection('users').authWithPassword(this.email, this.pass);
                        this.user = this.pb.authStore.model; 
                        await this.loadData();
                        this.subscribeToTasks();
                    } catch (e) {
                        this.errorMessage = 'Chyba při přihlášení: ' + (e.message || 'Neznámá chyba');
                        console.error("Chyba při přihlášení:", e);
                    }
                },

                logout() { 
                    if (this.pb) {
                        this.pb.collection('pulse_tasks').unsubscribe();
                        this.pb.authStore.clear(); 
                    }
                    this.user = null; 
                    this.tasks = []; 
                    this.statuses = []; 
                    this.priorities = []; 
                    this.availableUsers = []; 
                },

                async loadData() {
                    if (!this.pb) return;
                    this.loading = true;
                    try {
                        const allUsers = await this.pb.collection('users').getFullList();
                        const filteredUsers = allUsers.filter(u => u.apps && u.apps.includes('pulse'));
                        
                        const [t, s, p] = await Promise.all([
                            this.pb.collection('pulse_tasks').getFullList({ sort: '-created', expand: 'status,parent_task,priority', filter: 'status.is_closed != true' }),
                            this.pb.collection('pulse_statuses').getFullList({ sort: 'sort_order' }),
                            this.pb.collection('pulse_priorities').getFullList({ sort: 'level' })
                        ]);
                        this.tasks = t; 
                        this.statuses = s; 
                        this.availableUsers = filteredUsers; 
                        this.priorities = p;
                    } catch (e) {
                        this.errorMessage = 'Chyba při načítání dat: ' + (e.message || 'Neznámá chyba');
                        console.error("Chyba při načítání dat:", e);
                    } finally {
                        this.loading = false;
                    }
                },

                async loadTask(id) {
                    if (!this.pb) return null;
                    try {
                        return await this.pb.collection('pulse_tasks').getOne(id, { expand: 'status,parent_task,priority' });
                    } catch (e) {
                        console.error('Chyba při načítání úkolu:', e);
                        return null;
                    }
                },

                async subscribeToTasks() {
                    if (!this.pb) return;
                    await this.pb.collection('pulse_tasks').subscribe('*', async (e) => {
                        if (!e || !e.record) return;

                        if (e.action === 'delete') {
                            this.tasks = this.tasks.filter(task => task.id !== e.record.id);
                            return;
                        }

                        let updatedTask = e.record;
                        const existingTask = this.tasks.find(t => t.id === updatedTask.id);

                        if (existingTask && e.action === 'update') {
                            // Merge with existing expand to avoid unnecessary fetches
                            updatedTask.expand = existingTask.expand;
                            // Only fetch full data if expand-related fields changed
                            const expandChanged = updatedTask.status !== existingTask.status ||
                                                  updatedTask.parent_task !== existingTask.parent_task ||
                                                  updatedTask.priority !== existingTask.priority;
                            if (expandChanged) {
                                const loaded = await this.loadTask(updatedTask.id);
                                if (loaded) {
                                    updatedTask = loaded;
                                }
                            }
                        } else if (!existingTask || e.action === 'create') {
                            // For new tasks or if not found, fetch with expands
                            const loaded = await this.loadTask(updatedTask.id);
                            if (loaded) {
                                updatedTask = loaded;
                            }
                        }

                        const index = this.tasks.findIndex(task => task.id === updatedTask.id);
                        if (index !== -1) {
                            this.tasks.splice(index, 1, updatedTask);
                        } else {
                            this.tasks.push(updatedTask);
                        }

                        // Remove closed tasks to keep only open ones in memory
                        if (updatedTask.expand?.status?.is_closed) {
                            this.tasks = this.tasks.filter(t => t.id !== updatedTask.id);
                        }
                    });
                },

                get filteredTasks() {
                    return this.tasks
                        .filter(t => {
                            return this.onlyMine ? t.assignee.includes(this.user?.id) : true;
                        })
                        .sort((a, b) => {
                            // 1. Řazení podle data
                            if (!a.due_date && !b.due_date) {
                                return 0;
                            }
                            if (!a.due_date) {
                                return 1;
                            }
                            if (!b.due_date) {
                                return -1;
                            }
                            const dateA = new Date(a.due_date).getTime();
                            const dateB = new Date(b.due_date).getTime();
                            if (dateA !== dateB) return dateA - dateB;

                            // 2. Řazení podle priority
                            const levelA = a.expand?.priority?.level ?? 999;
                            const levelB = b.expand?.priority?.level ?? 999;
                            return levelA - levelB;
                        });
                },

                getUserAvatar(userId) {
                    const u = this.availableUsers.find(x => x.id === userId);
                    if (u && u.avatar) return this.pb.files.getURL(u, u.avatar, { thumb: '64x64' });
                    return `https://ui-avatars.com/api/?name=${encodeURIComponent(u?.name || 'U')}&background=random`;
                },

                getUserName(userId) {
                    const u = this.availableUsers.find(x => x.id === userId);
                    return u ? (u.name || u.email) : 'Neznámý';
                },

                setQuickDate(days) {
                    this.editingTask.due_date = dayjs().add(days, 'day').format('YYYY-MM-DDTHH:mm');
                },

                get rootTasks() {
                    return this.tasks.filter(t => !t.parent_task);
                },

                get flatTree() {
                    const result = [];
                    const build = (task, depth) => {
                        const children = this.tasks.filter(t => t.parent_task === task.id);
                        if (this.onlyMine && !task.assignee.includes(this.user?.id) && !children.some(c => this.hasAssignedRecursive(c))) return;
                        result.push({ task, depth });
                        children.forEach(child => build(child, depth + 1));
                    };
                    this.rootTasks.forEach(task => build(task, 0));
                    return result;
                },

                getNodeIcon(task) {
                    return this.tasks.some(t => t.parent_task === task.id) ? 'folder_open' : 'description';
                },

                hasAssignedRecursive(task) {
                    if (task.assignee.includes(this.user?.id)) return true;
                    return this.tasks.filter(t => t.parent_task === task.id).some(c => this.hasAssignedRecursive(c));
                },

                openEditById(id) { const t = this.tasks.find(x => x.id === id); if (t) this.openEdit(t); },
                completeTaskById(id) { const t = this.tasks.find(x => x.id === id); if (t) this.completeTask(t); },

                async addTask() {
                    const title = this.newTaskTitle.trim();
                    if (!title) return;
                    await this.pb.collection('pulse_tasks').create({ 
                        title: this.sanitize(title), 
                        assignee: [this.user.id], 
                        creator: this.user.id 
                    });
                    this.newTaskTitle = ''; await this.loadData();
                },

                async completeTask(task) {
                    const done = this.statuses.find(s => s.is_closed);
                    if (done) { 
                        await this.pb.collection('pulse_tasks').update(task.id, { status: done.id }); 
                        await this.loadData(); 
                    }
                },

                async claimTask(task) {
                    let ids = [...(task.assignee || [])];
                    ids = ids.includes(this.user.id) ? ids.filter(i => i !== this.user.id) : [...ids, this.user.id];
                    await this.pb.collection('pulse_tasks').update(task.id, { assignee: ids }); 
                    await this.loadData();
                },

                openEdit(task) {
                    let localDate = '';
                    if (task.due_date) {
                        localDate = dayjs(task.due_date).format('YYYY-MM-DDTHH:mm');
                    }
                    this.editingTask = { ...task, due_date: localDate };
                },

                async saveEdit() {
                    const { id, title, description, status, due_date, assignee, parent_task, priority } = this.editingTask;
                    const data = { 
                        title: this.sanitize(title), 
                        description: this.sanitize(description), 
                        due_date: due_date ? dayjs(due_date).toISOString() : null, 
                        assignee, 
                        priority: priority || null, 
                        status, 
                        parent_task: parent_task || null 
                    };
                    await this.pb.collection('pulse_tasks').update(id, data);
                    this.editingTask = null; 
                    await this.loadData();
                },

                formatDate(d) { return new Date(d).toLocaleDateString('cs-CZ', {day:'numeric', month:'short'}); },

                sanitize(str) {
                    if (!str) return '';
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                }
            }
        }
    </script>
</body>
</html>
